server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: three-tier-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:demo_app}?useSSL=${DB_USE_SSL:false}&requireSSL=${DB_REQUIRE_SSL:false}&verifyServerCertificate=${DB_VERIFY_SERVER_CERTIFICATE:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&serverTimezone=UTC
    username: ${DB_USER:demo_user}
    password: ${DB_PASSWORD:demo_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: threeTierPool
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
